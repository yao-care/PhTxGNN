# Philippine National Formulary (PNF) field configuration

# Basic settings
country_code: "PH"
language: "en"  # PNF uses English
regulatory_agency: "DOH-FDA Philippines"

# Field mapping
# Maps PNF data fields to standard fields
field_mapping:
  license_id: "license_id"
  brand_name_local: "brand_name"
  brand_name_en: "brand_name"
  ingredients: "ingredient"
  indication: ""  # PNF-EML does not include indication data
  dosage_form: ""
  manufacturer: ""
  approval_date: ""
  status: "status"

# Withdrawn/invalid status values
withdrawn_statuses:
  - "withdrawn"
  - "cancelled"
  - "revoked"

# Ingredient separator
ingredient_separator: ";"

# Date format
date_format: "%Y-%m-%d"

# Encoding
encoding: "utf-8"

# Data source information
data_source:
  name: "Philippine National Formulary Essential Medicines List"
  edition: "8th Edition"
  year: 2022
  publisher: "Department of Health Philippines"
  url: "https://www.doh.gov.ph/philippine-national-formulary"
