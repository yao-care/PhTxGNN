<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching PhTxGNN SMART App...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0038A8 0%, #CE1126 50%, #FCD116 100%);
            color: white;
        }
        .loading {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.5em;
        }
        .error {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
        }
        .error h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h1>PhTxGNN</h1>
        <p>Connecting to EHR...</p>
    </div>
    <div class="error" id="error" style="display: none;">
        <h2>Launch Error</h2>
        <p id="error-message"></p>
        <p><small>Please contact your system administrator.</small></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.4/build/fhir-client.min.js" integrity="sha384-oPoE+RWX2AZE9PQcDKKsuPU0dLmhGHCmCScrIneODytrl3mhPoRcGbDXVJyt0Q1t" crossorigin="anonymous"></script>
    <script>
        // PhTxGNN SMART on FHIR Configuration
        const CLIENT_ID = "phtxgnn-smart-app";
        const REDIRECT_URI = window.location.origin + "/smart/app.html";

        // Requested FHIR scopes
        const SCOPES = [
            "launch",
            "patient/Patient.read",
            "patient/MedicationRequest.read",
            "patient/MedicationStatement.read",
            "patient/Condition.read"
        ].join(" ");

        FHIR.oauth2.authorize({
            client_id: CLIENT_ID,
            scope: SCOPES,
            redirect_uri: REDIRECT_URI,
            pkce: true
        }).catch(function(error) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error-message").textContent =
                error.message || "Unknown error occurred during SMART launch";
            console.error("SMART Launch Error:", error);
        });
    </script>
</body>
</html>
